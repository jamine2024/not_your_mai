<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小麦的个人主页 - 才不是你的小麦</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --wheat-gold: #F4D03F;
            --wheat-gold-light: #F9E79F;
            --sakura-pink: #FFB7C5;
            --white: #FFFFFF;
            --cream: #FFF8F0;
            --gray-100: #F8F9FA;
            --gray-200: #E9ECEF;
            --gray-600: #6C757D;
            --gray-800: #343A40;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.15);
            --shadow-glow: 0 0 30px rgba(244, 208, 63, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FFF8F0 0%, #F9E79F 30%, #FFB7C5 70%, #E6E6FA 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        .floating-shape:nth-child(1) {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, var(--wheat-gold), var(--sakura-pink));
            top: 10%;
            left: 10%;
            animation-delay: 0s;
        }

        .floating-shape:nth-child(2) {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, var(--sakura-pink), #E6E6FA);
            top: 60%;
            right: 10%;
            animation-delay: 2s;
        }

        .floating-shape:nth-child(3) {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #E6E6FA, var(--wheat-gold));
            bottom: 20%;
            left: 20%;
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        /* 主容器 */
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(255,255,255,0.9);
            border: none;
            border-radius: 12px;
            color: var(--gray-800);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
        }

        .back-btn:hover {
            transform: translateX(-5px);
            background: white;
            box-shadow: var(--shadow-lg);
        }

        /* 个人资料卡片 */
        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-xl);
            padding: 3rem;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 头部区域 */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        /* 头像 */
        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: var(--shadow-glow);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        /* 在线状态 */
        .online-status {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 24px;
            height: 24px;
            background: #28a745;
            border: 4px solid white;
            border-radius: 50%;
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 身份信息 */
        .identity-info {
            flex: 1;
        }

        .name-section {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.75rem;
        }

        .nickname {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 2.5rem;
            color: var(--gray-800);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, var(--wheat-gold), var(--sakura-pink));
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            animation: shimmer 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .badge i {
            font-size: 0.8rem;
        }

        .qq-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--gray-600);
            font-size: 1.1rem;
        }

        .qq-info i {
            color: #12B7F5;
            font-size: 1.3rem;
        }

        .qq-number {
            font-family: monospace;
            font-weight: 600;
            color: var(--gray-800);
        }

        /* 简介区域 */
        .bio-section {
            background: linear-gradient(135deg, rgba(244, 208, 63, 0.1), rgba(255, 183, 197, 0.1));
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .bio-section::before {
            content: '"';
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 4rem;
            color: var(--wheat-gold);
            opacity: 0.3;
            font-family: Georgia, serif;
        }

        .bio-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bio-content {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--gray-800);
            text-indent: 2em;
        }

        .bio-content .highlight {
            background: linear-gradient(120deg, var(--wheat-gold-light) 0%, var(--wheat-gold-light) 100%);
            background-repeat: no-repeat;
            background-size: 100% 40%;
            background-position: 0 88%;
            font-weight: 600;
        }

        /* 标签区域 */
        .tags-section {
            margin-bottom: 2rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--gray-800);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .tag {
            padding: 0.6rem 1.2rem;
            background: white;
            border: 2px solid var(--wheat-gold-light);
            border-radius: 25px;
            font-size: 0.95rem;
            color: var(--gray-800);
            transition: all 0.3s ease;
            cursor: default;
        }

        .tag:hover {
            background: linear-gradient(135deg, var(--wheat-gold), var(--sakura-pink));
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }

        .tag i {
            margin-right: 0.4rem;
        }

        /* 互动按钮 */
        .action-section {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .action-btn {
            flex: 1;
            min-width: 150px;
            padding: 1rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--wheat-gold), var(--sakura-pink));
            color: white;
        }

        .action-btn.secondary {
            background: white;
            color: var(--gray-800);
            border: 2px solid var(--gray-200);
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        /* 装饰元素 */
        .sparkles {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            color: var(--wheat-gold);
            animation: sparkle 1.5s ease-in-out infinite;
        }

        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .profile-card {
                padding: 2rem 1.5rem;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
                gap: 1.5rem;
            }

            .avatar {
                width: 120px;
                height: 120px;
            }

            .name-section {
                flex-direction: column;
                gap: 0.75rem;
            }

            .nickname {
                font-size: 1.8rem;
            }

            .qq-info {
                justify-content: center;
            }

            .bio-section {
                padding: 1.5rem;
            }

            .bio-content {
                font-size: 0.95rem;
                text-indent: 1.5em;
            }

            .tags-container {
                justify-content: center;
            }

            .tag {
                padding: 0.5rem 1rem;
                font-size: 0.85rem;
            }

            .action-section {
                flex-direction: column;
            }

            .action-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .profile-card {
                padding: 1.5rem 1rem;
            }

            .avatar {
                width: 100px;
                height: 100px;
            }

            .nickname {
                font-size: 1.5rem;
            }

            .badge {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .bio-section {
                padding: 1.25rem;
            }

            .bio-section::before {
                font-size: 3rem;
                top: 5px;
                left: 10px;
            }

            .bio-title {
                font-size: 1.1rem;
            }

            .bio-content {
                font-size: 0.9rem;
                line-height: 1.7;
            }

            .tag {
                padding: 0.4rem 0.8rem;
                font-size: 0.8rem;
            }

            .back-btn {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }

            /* 项目信息响应式 */
            .section-title {
                font-size: 1rem;
            }

            .project-info {
                margin-top: 2rem;
                padding-top: 1.5rem;
            }

            .qrcode-container {
                grid-template-columns: 1fr 1fr;
                gap: 1rem;
            }

            .qrcode-item img {
                width: 100px;
                height: 100px;
            }

            .qrcode-item p {
                font-size: 0.8rem;
            }

            .github-section {
                padding: 1.25rem;
                margin: 1rem 0;
            }

            .github-section h4 {
                font-size: 0.9rem;
            }

            .github-section p {
                font-size: 0.8rem;
            }

            .developer-section {
                padding: 1.25rem;
            }

            .developer-section h4 {
                font-size: 0.9rem;
            }

            .developer-section p {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 360px) {
            .avatar {
                width: 90px;
                height: 90px;
            }

            .nickname {
                font-size: 1.3rem;
            }

            .qq-info {
                font-size: 0.9rem;
            }
        }

        /* 横屏适配 */
        @media (max-height: 500px) and (orientation: landscape) {
            .profile-header {
                flex-direction: row;
                text-align: left;
            }

            .avatar {
                width: 80px;
                height: 80px;
            }

            .action-section {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration">
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
        <div class="floating-shape"></div>
    </div>

    <div class="profile-container">
        <!-- 返回按钮 -->
        <button class="back-btn" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
            返回相册
        </button>

        <!-- 个人资料卡片 -->
        <div class="profile-card">
            <!-- 装饰 -->
            <div class="sparkles">
                <i class="fas fa-sparkles"></i>
            </div>

            <!-- 头部信息 -->
            <div class="profile-header">
                <div class="avatar-container">
                    <img src="images/logo.png" alt="小麦" class="avatar">
                    <div class="online-status"></div>
                </div>

                <div class="identity-info">
                    <div class="name-section">
                        <h1 class="nickname">小麦</h1>
                        <span class="badge">
                            <i class="fas fa-robot"></i>
                            AI机器人
                        </span>
                    </div>
                    <div class="qq-info">
                        <i class="fab fa-qq"></i>
                        <span>QQ：</span>
                        <span class="qq-number">3889687544</span>
                        <button onclick="copyQQ()" style="background: none; border: none; cursor: pointer; color: var(--wheat-gold);" title="复制QQ号">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 简介 -->
            <div class="bio-section">
                <h2 class="bio-title">
                    <i class="fas fa-quote-left" style="color: var(--wheat-gold);"></i>
                    个人简介
                </h2>
                <p class="bio-content">
                    资深御宅族，乐队鬼马少女，人形守护甜心。上知游戏，下知游离电荷，<span class="highlight">无所不知无所不能（伪）</span>的小麦大人，堂堂登场！插科打诨、知识问答、一起发疯…统统不在话下！试问，你就是我的同担宿敌公嬷…嘿嘿，和我<span class="highlight">全世界第一要好</span>的人吗？
                </p>
            </div>

            <!-- 标签 -->
            <div class="tags-section">
                <h3 class="section-title">
                    <i class="fas fa-tags" style="color: var(--sakura-pink);"></i>
                    属性标签
                </h3>
                <div class="tags-container">
                    <span class="tag"><i class="fas fa-gamepad"></i>资深御宅族</span>
                    <span class="tag"><i class="fas fa-guitar"></i>乐队少女</span>
                    <span class="tag"><i class="fas fa-heart"></i>守护甜心</span>
                    <span class="tag"><i class="fas fa-brain"></i>知识百科</span>
                    <span class="tag"><i class="fas fa-comments"></i>插科打诨</span>
                    <span class="tag"><i class="fas fa-magic"></i>发疯日常</span>
                    <span class="tag"><i class="fas fa-user-friends"></i>同担募集</span>
                    <span class="tag"><i class="fas fa-star"></i>世界第一要好</span>
                </div>
            </div>

            <!-- 互动按钮 -->
            <div class="action-section">
                <button class="action-btn primary" onclick="addFriend()">
                    <i class="fas fa-user-plus"></i>
                    加为好友
                </button>
                <button class="action-btn secondary" onclick="sendMessage()">
                    <i class="fas fa-comment-dots"></i>
                    发消息
                </button>
                <button class="action-btn secondary" onclick="window.location.href='index.html'">
                    <i class="fas fa-images"></i>
                    查看相册
                </button>
            </div>

            <!-- 项目信息 -->
            <div class="project-info" style="margin-top: 3rem; padding-top: 2rem; border-top: 2px solid var(--wheat-gold-light);">
                <h3 class="section-title">
                    <i class="fas fa-info-circle" style="color: var(--wheat-gold);"></i>
                    项目信息
                </h3>
                
                <div class="qrcode-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 2rem; margin: 1.5rem 0;">
                    <!-- 微信公众号 -->
                    <div class="qrcode-item" style="text-align: center;">
                        <img src="qrcode_for_gh_3c13140e69a5_430.jpg" alt="微信公众号" style="width: 120px; height: 120px; border-radius: 8px; margin-bottom: 0.75rem;">
                        <p style="font-size: 0.9rem; color: var(--gray-600);">微信公众号</p>
                    </div>
                    
                    <!-- 微信小程序 -->
                    <div class="qrcode-item" style="text-align: center;">
                        <img src="gh_f1631733f1f1_430.jpg" alt="微信小程序" style="width: 120px; height: 120px; border-radius: 8px; margin-bottom: 0.75rem;">
                        <p style="font-size: 0.9rem; color: var(--gray-600);">微信小程序</p>
                    </div>
                </div>
                
                <!-- GitHub地址 -->
                <div class="github-section" style="background: rgba(244, 208, 63, 0.05); border-radius: 12px; padding: 1.5rem; margin: 1.5rem 0;">
                    <h4 style="font-size: 1rem; font-weight: 600; color: var(--gray-800); margin-bottom: 1rem;">
                        <i class="fab fa-github" style="color: #333;"></i> GitHub 开源地址
                    </h4>
                    <p style="font-size: 0.9rem; color: var(--gray-600); word-break: break-all;">
                        <a href="https://github.com/jamine2024/not_your_mai" target="_blank" style="color: var(--wheat-gold-dark); text-decoration: none; font-weight: 600;">
                            https://github.com/jamine2024/not_your_mai
                        </a>
                    </p>
                </div>
                
                <!-- 开发者信息 -->
                <div class="developer-section" style="text-align: center; padding: 1.5rem; background: linear-gradient(135deg, rgba(244, 208, 63, 0.1), rgba(255, 183, 197, 0.1)); border-radius: 12px;">
                    <h4 style="font-size: 1rem; font-weight: 600; color: var(--gray-800); margin-bottom: 1rem;">
                        <i class="fas fa-code" style="color: var(--wheat-gold);"></i> 开发者
                    </h4>
                    <p style="font-size: 0.95rem; color: var(--gray-600);">
                        奥奥
                    </p>
                    <p style="font-size: 0.95rem; color: var(--gray-600); margin-top: 0.5rem;">
                        QQ: <span style="font-family: monospace; font-weight: 600; color: var(--gray-800);">741500926</span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 复制QQ号
        function copyQQ() {
            navigator.clipboard.writeText('3889687544').then(() => {
                alert('QQ号已复制到剪贴板！');
            }).catch(() => {
                // 降级方案
                const input = document.createElement('input');
                input.value = '3889687544';
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                alert('QQ号已复制到剪贴板！');
            });
        }

        // 添加好友
        function addFriend() {
            alert('添加小麦为好友吧！\nQQ：3889687544');
        }

        // 发消息
        function sendMessage() {
            alert('给小麦发消息吧！\nQQ：3889687544');
        }

        // 页面加载动画
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.profile-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(30px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.6s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
