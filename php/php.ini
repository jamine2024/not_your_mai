; PHP配置 - 才不是你的小麦相册

; 文件上传
upload_max_filesize = 100M
post_max_size = 500M
max_file_uploads = 200

; 内存和执行时间
memory_limit = 1G
max_execution_time = 600
max_input_time = 600

; 错误显示 (生产环境建议关闭)
display_errors = Off
error_reporting = 0

; 时区
date.timezone = Asia/Shanghai

; 会话
session.gc_maxlifetime = 3600

; GD库
extension=gd

; MySQL
extension=pdo_mysql

; Imagick
extension=imagick
